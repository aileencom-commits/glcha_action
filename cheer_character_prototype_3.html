<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>응원 캐릭터 버튼 프로토타입</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0A0A0A;
  --surface: #141414;
  --green: #22C55E;
  --font: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
}

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
  color: #fff;
  padding: 24px;
  overflow: hidden;
}

/* ── 폰 프레임 ── */
.phone {
  width: 320px;
  background: var(--surface);
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 0 8px #1a1a1a, 0 24px 60px rgba(0,0,0,0.8);
  border: 1px solid #2a2a2a;
}

/* ── 아티스트 행 ── */
.artist-row {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: relative;
}
.rank-num {
  font-size: 22px; font-weight: 800;
  color: #fff; width: 32px; flex-shrink: 0;
}
.artist-photo {
  width: 48px; height: 48px; border-radius: 50%;
  margin: 0 10px; flex-shrink: 0;
  background: linear-gradient(135deg, #1a1a4a, #2a2a6a);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.artist-info { flex: 1; min-width: 0; }
.artist-name { font-size: 14px; font-weight: 700; color: #fff; }
.platform-ranks { display: flex; gap: 7px; margin-top: 4px; }
.p-tag { font-size: 10px; color: #555; }
.p-tag .val { color: #888; font-weight: 600; }

/* ── 우측 액션 ── */
.row-right {
  display: flex; align-items: center; gap: 6px;
  margin-left: 8px; flex-shrink: 0;
}

/* ── 캐릭터 응원 버튼 ── */
.cheer-btn {
  width: 44px; height: 44px;
  background: none; border: none;
  cursor: pointer;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  flex-shrink: 0;
}

/* 캐릭터 SVG 래퍼 */
.char-wrap {
  width: 40px; height: 40px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  transform-origin: center bottom;
}

/* 캐릭터 얼굴 (SVG로 직접 그림) */
.char-svg {
  width: 100%; height: 100%;
  transform-origin: center;
  transition: none;
}

/* ── 단계별 애니메이션 keyframes ── */

/* 0단계: 멈춤 */
@keyframes idle { 0%,100% { transform: rotate(0deg) scale(1); } }

/* 1단계: 느릿느릿 좌우 */
@keyframes wobble-1 {
  0%,100% { transform: rotate(0deg) translateY(0); }
  25%      { transform: rotate(-8deg) translateY(-1px); }
  75%      { transform: rotate(8deg) translateY(-1px); }
}

/* 2단계: 좀 더 빠르게 */
@keyframes wobble-2 {
  0%,100% { transform: rotate(0deg) translateY(0); }
  25%      { transform: rotate(-14deg) translateY(-2px); }
  75%      { transform: rotate(14deg) translateY(-2px); }
}

/* 3단계: 격렬하게 */
@keyframes wobble-3 {
  0%,100% { transform: rotate(0deg) scale(1) translateY(0); }
  20%      { transform: rotate(-20deg) scale(1.1) translateY(-3px); }
  40%      { transform: rotate(20deg) scale(1.1) translateY(-3px); }
  60%      { transform: rotate(-18deg) scale(0.95) translateY(0); }
  80%      { transform: rotate(18deg) scale(1.05) translateY(-2px); }
}

/* 4단계: 완전 흔들림 */
@keyframes wobble-4 {
  0%       { transform: rotate(0deg) scale(1) translate(0,0); }
  10%      { transform: rotate(-25deg) scale(1.2) translate(-2px,-4px); }
  20%      { transform: rotate(25deg) scale(0.9) translate(2px,-2px); }
  30%      { transform: rotate(-20deg) scale(1.15) translate(-1px,-3px); }
  40%      { transform: rotate(30deg) scale(1.0) translate(3px,-1px); }
  50%      { transform: rotate(-28deg) scale(1.2) translate(-3px,-4px); }
  60%      { transform: rotate(22deg) scale(0.95) translate(2px,0px); }
  70%      { transform: rotate(-30deg) scale(1.15) translate(-2px,-3px); }
  80%      { transform: rotate(28deg) scale(1.1) translate(3px,-2px); }
  90%      { transform: rotate(-20deg) scale(0.9) translate(-1px,-1px); }
  100%     { transform: rotate(0deg) scale(1) translate(0,0); }
}

/* 5단계: 완전 미침 — 360회전 포함 */
@keyframes wobble-5 {
  0%   { transform: rotate(0deg) scale(1) translate(0,0); }
  15%  { transform: rotate(-35deg) scale(1.3) translate(-3px,-5px); }
  30%  { transform: rotate(180deg) scale(0.8) translate(2px,2px); }
  45%  { transform: rotate(200deg) scale(1.4) translate(-4px,-3px); }
  60%  { transform: rotate(270deg) scale(0.9) translate(3px,-1px); }
  75%  { transform: rotate(320deg) scale(1.3) translate(-2px,-4px); }
  90%  { transform: rotate(355deg) scale(1.1) translate(1px,-2px); }
  100% { transform: rotate(360deg) scale(1) translate(0,0); }
}

/* 눌렸을 때 찌그러짐 */
@keyframes squish {
  0%   { transform: scaleX(1.3) scaleY(0.7); }
  50%  { transform: scaleX(0.8) scaleY(1.2); }
  100% { transform: scaleX(1) scaleY(1); }
}

/* 파티클 */
@keyframes pop-out {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

/* 플로팅 이모지 */
@keyframes float-up {
  0%   { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
  100% { transform: translateY(-80px) translateX(var(--drift)) scale(0.5); opacity: 0; }
}

/* 화면 흔들림 */
@keyframes screen-shake {
  0%,100% { transform: translate(0,0); }
  15% { transform: translate(-4px, 3px); }
  30% { transform: translate(4px, -3px); }
  45% { transform: translate(-3px, 4px); }
  60% { transform: translate(3px, -2px); }
  75% { transform: translate(-2px, 3px); }
  90% { transform: translate(2px, -1px); }
}

/* 배경 플래시 */
@keyframes flash {
  0%   { opacity: 0.4; }
  100% { opacity: 0; }
}

/* 눈 깜박임 */
@keyframes blink {
  0%,90%,100% { transform: scaleY(1); }
  95%          { transform: scaleY(0.1); }
}

/* 단계 전환 — 위로 점프 */
@keyframes jump {
  0%   { transform: translateY(0) scale(1); }
  30%  { transform: translateY(-12px) scale(1.1); }
  60%  { transform: translateY(-4px) scale(0.95); }
  80%  { transform: translateY(-6px) scale(1.05); }
  100% { transform: translateY(0) scale(1); }
}

/* 카운트 팝 */
@keyframes count-pop {
  0%   { transform: scale(0) translateY(0); opacity: 1; }
  60%  { transform: scale(1.2) translateY(-16px); opacity: 1; }
  100% { transform: scale(0.8) translateY(-24px); opacity: 0; }
}

/* 마일스톤 오버레이 */
@keyframes overlay-in {
  from { transform: scale(0.8); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@keyframes emoji-bounce {
  0%,100% { transform: translateY(0) rotate(0deg); }
  25%      { transform: translateY(-14px) rotate(-10deg); }
  75%      { transform: translateY(-8px) rotate(10deg); }
}

/* 진행 바 */
.stage-bar {
  padding: 10px 18px 8px;
  display: flex; align-items: center; gap: 8px;
}
.stage-label-text {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.06em; min-width: 72px;
  transition: color 0.3s;
}
.stage-track {
  flex: 1; height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: 2px; overflow: hidden;
}
.stage-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.2s, background 0.4s;
  width: 0%;
}
.stage-count-text {
  font-size: 10px; font-weight: 700;
  min-width: 24px; text-align: right;
  transition: color 0.3s;
}

/* 파티클 레이어 */
.particle-layer {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 20; overflow: hidden;
}

/* 배경 플래시 레이어 */
.flash-layer {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 5;
  opacity: 0;
}

/* 마일스톤 오버레이 */
.milestone {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.milestone.show { opacity: 1; pointer-events: all; }
.milestone-inner {
  text-align: center;
  animation: overlay-in 0.3s ease;
}
.ms-emoji {
  font-size: 58px; margin-bottom: 10px;
  display: block;
  animation: emoji-bounce 0.8s ease infinite;
}
.ms-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 6px; }
.ms-sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 20px; line-height: 1.6; }
.ms-btn {
  background: var(--green); color: #000;
  border: none; border-radius: 100px;
  padding: 10px 28px; font-size: 13px; font-weight: 800;
  cursor: pointer; font-family: var(--font);
  margin-bottom: 8px; display: block; width: 100%;
}
.ms-close {
  background: none; border: none;
  font-size: 12px; color: rgba(255,255,255,0.3);
  cursor: pointer; font-family: var(--font);
}
.ms-close-x {
  position: absolute; top: 14px; right: 18px;
  background: none; border: none; color: #555;
  font-size: 18px; cursor: pointer;
}

/* 토스트 */
.toast {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%);
  padding: 5px 14px; border-radius: 100px;
  font-size: 11px; font-weight: 800;
  white-space: nowrap; z-index: 90;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
}
.toast.show { opacity: 1; }

/* 범례 */
.legend {
  margin-top: 22px;
  display: flex; gap: 10px; flex-wrap: wrap;
  justify-content: center; max-width: 320px;
}
.leg {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: #444; font-weight: 600;
}
.leg-dot { width: 7px; height: 7px; border-radius: 50%; }

/* 가이드 */
.guide {
  margin-top: 16px;
  font-size: 11px; color: #333;
  text-align: center; line-height: 1.8;
}
.guide b { color: #555; }

/* 토글 버튼 */
.toggle-btn {
  width: 20px; height: 20px;
  background: none; border: none;
  color: #333; font-size: 10px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* 확장 블록 */
.expand-block {
  background: #2020C0; padding: 12px 18px;
  display: none;
}
.expand-block.open { display: block; }
.exp-label { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.exp-song { display: flex; align-items: center; gap: 8px; }
.exp-thumb { width: 34px; height: 34px; border-radius: 6px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.exp-title { font-size: 12px; font-weight: 700; color: #fff; }
.exp-sub { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- 레이어들 -->
  <div class="particle-layer" id="particleLayer"></div>
  <div class="flash-layer" id="flashLayer"></div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- 마일스톤 -->
  <div class="milestone" id="milestone">
    <button class="ms-close-x" onclick="closeMilestone()">✕</button>
    <div class="milestone-inner" style="padding: 0 32px;">
      <span class="ms-emoji" id="msEmoji">🎉</span>
      <div class="ms-title" id="msTitle">축하!</div>
      <div class="ms-sub" id="msSub">잘하고 있어요</div>
      <button class="ms-btn" onclick="closeMilestone()">📣 공유하기</button>
      <button class="ms-close" onclick="closeMilestone()">그냥 계속 응원할게요</button>
    </div>
  </div>

  <!-- 단계 바 -->
  <div class="stage-bar">
    <div class="stage-label-text" id="stageLbl" style="color:#3a3a3a">😴 대기 중</div>
    <div class="stage-track">
      <div class="stage-fill" id="stageFill"></div>
    </div>
    <div class="stage-count-text" id="stageCnt" style="color:#3a3a3a">0</div>
  </div>

  <!-- 1위 아티스트 행 — 인터랙티브 -->
  <div class="artist-row" id="mainRow">
    <div class="rank-num">1</div>
    <div class="artist-photo">🎤</div>
    <div class="artist-info">
      <div class="artist-name">방탄소년단</div>
      <div class="platform-ranks">
        <span class="p-tag">Melon <span class="val">2위</span></span>
        <span class="p-tag">· TME <span class="val">5위</span></span>
        <span class="p-tag">· LINE <span class="val">1위</span></span>
      </div>
    </div>
    <div class="row-right">
      <!-- 캐릭터 버튼 -->
      <button class="cheer-btn" id="cheerBtn" onclick="onCheer()">
        <div class="char-wrap" id="charWrap">
          <!-- SVG 캐릭터 — 눌릴수록 표정 변화 -->
          <svg class="char-svg" id="charSvg" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <!-- 강아지 귀 (축 늘어진 귀) -->
            <ellipse id="earL" cx="9" cy="21" rx="5" ry="7" fill="#C8A882" transform="rotate(-15 9 21)"/>
            <ellipse cx="9" cy="21" rx="3" ry="5" fill="#B8906A" opacity="0.6" transform="rotate(-15 9 21)"/>
            <ellipse id="earR" cx="31" cy="21" rx="5" ry="7" fill="#C8A882" transform="rotate(15 31 21)"/>
            <ellipse cx="31" cy="21" rx="3" ry="5" fill="#B8906A" opacity="0.6" transform="rotate(15 31 21)"/>
            <!-- 몸통 -->
            <circle id="bodyCircle" cx="20" cy="22" r="13" fill="#E8C99A"/>
            <!-- 주둥이 -->
            <ellipse cx="20" cy="27" rx="5.5" ry="4" fill="#D4B080"/>
            <!-- 볼터치 -->
            <circle id="cheekL" cx="12" cy="24" r="2.8" fill="#FF9EB5" opacity="0.6"/>
            <circle id="cheekR" cx="28" cy="24" r="2.8" fill="#FF9EB5" opacity="0.6"/>
            <!-- 눈 (기본) -->
            <g id="eyeGroup">
              <circle cx="15.5" cy="19.5" r="3" fill="white"/>
              <circle cx="15.8" cy="19.8" r="1.8" fill="#2A1A0A"/>
              <circle cx="16.4" cy="19" r="0.7" fill="white"/>
              <circle cx="24.5" cy="19.5" r="3" fill="white"/>
              <circle cx="24.8" cy="19.8" r="1.8" fill="#2A1A0A"/>
              <circle cx="25.4" cy="19" r="0.7" fill="white"/>
            </g>
            <!-- 별눈 -->
            <g id="starEyes" opacity="0">
              <text x="11.5" y="23" font-size="9" fill="#FFD700">★</text>
              <text x="21" y="23" font-size="9" fill="#FFD700">★</text>
            </g>
            <!-- 하트눈 -->
            <g id="heartEyes" opacity="0">
              <text x="11.5" y="23" font-size="9" fill="#FF4488">♥</text>
              <text x="21" y="23" font-size="9" fill="#FF4488">♥</text>
            </g>
            <!-- 코 (동그란 강아지 코) -->
            <ellipse cx="20" cy="25" rx="2.5" ry="1.8" fill="#3A2010"/>
            <!-- 입 -->
            <path id="mouthPath" d="M17 28 Q20 30 23 28" stroke="#8B6040" stroke-width="1.3" fill="none" stroke-linecap="round"/>
            <!-- 혀 (단계3+에서 나옴) -->
            <ellipse id="tongue" cx="20" cy="31" rx="2.2" ry="1.5" fill="#FF7799" opacity="0"/>
            <!-- 꼬리 (뒤에서 살짝 보임) -->
            <path id="tail" d="M32 30 Q38 24 35 18" stroke="#C8A882" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <!-- 팔 -->
            <path id="armL" d="M9 28 Q5 32 7 36" stroke="#D4B080" stroke-width="3" fill="none" stroke-linecap="round"/>
            <path id="armR" d="M31 28 Q35 32 33 36" stroke="#D4B080" stroke-width="3" fill="none" stroke-linecap="round"/>
            <!-- 응원봉 -->
            <g id="pompom" opacity="0">
              <line x1="7" y1="36" x2="4" y2="29" stroke="#ccc" stroke-width="1.5"/>
              <circle cx="4" cy="28" r="3" fill="#FF4444"/>
              <line x1="33" y1="36" x2="36" y2="29" stroke="#ccc" stroke-width="1.5"/>
              <circle cx="36" cy="28" r="3" fill="#4488FF"/>
            </g>
            <!-- 땀방울 -->
            <g id="sweatDrop" opacity="0">
              <ellipse cx="33" cy="13" rx="2" ry="3" fill="#87CEEB"/>
            </g>
          </svg>
        </div>
      </button>
      <button class="toggle-btn" onclick="toggleExpand()">▼</button>
    </div>
  </div>

  <!-- 확장 블록 -->
  <div class="expand-block" id="expandBlock">
    <div class="exp-label">최신 발매곡</div>
    <div class="exp-song">
      <div class="exp-thumb">🎵</div>
      <div>
        <div class="exp-title">Come Over</div>
        <div class="exp-sub">방탄소년단</div>
      </div>
    </div>
  </div>

  <!-- 2위 — RIIZE 토끼 -->
  <div class="artist-row">
    <div class="rank-num">2</div>
    <div class="artist-photo" style="background:linear-gradient(135deg,#1a3a1a,#2a4a2a)">👥</div>
    <div class="artist-info">
      <div class="artist-name">RIIZE</div>
      <div class="platform-ranks">
        <span class="p-tag">Melon <span class="val">1위</span></span>
        <span class="p-tag">· TME <span class="val">3위</span></span>
      </div>
    </div>
    <div class="row-right">
      <button class="cheer-btn" id="cheerBtn2" onclick="onCheer2()">
        <div class="char-wrap" id="charWrap2">
          <svg class="char-svg" id="charSvg2" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
            <!-- 토끼 귀 (길쭉) -->
            <ellipse id="earL2" cx="14" cy="8" rx="4" ry="8" fill="#F0C0D0"/>
            <ellipse cx="14" cy="8" rx="2.2" ry="5.5" fill="#FF9EB5"/>
            <ellipse id="earR2" cx="26" cy="8" rx="4" ry="8" fill="#F0C0D0"/>
            <ellipse cx="26" cy="8" rx="2.2" ry="5.5" fill="#FF9EB5"/>
            <!-- 몸통 -->
            <circle id="bodyCircle2" cx="20" cy="23" r="13" fill="#F5F0FF"/>
            <!-- 볼터치 -->
            <circle id="cheekL2" cx="13" cy="25" r="2.5" fill="#FFB3C6" opacity="0.7"/>
            <circle id="cheekR2" cx="27" cy="25" r="2.5" fill="#FFB3C6" opacity="0.7"/>
            <!-- 눈 (기본) -->
            <g id="eyeGroup2">
              <circle cx="16" cy="21" r="2.8" fill="white"/>
              <circle id="pupilL2" cx="16.5" cy="21.5" r="1.6" fill="#222"/>
              <circle cx="17" cy="20.8" r="0.6" fill="white"/>
              <circle cx="24" cy="21" r="2.8" fill="white"/>
              <circle id="pupilR2" cx="24.5" cy="21.5" r="1.6" fill="#222"/>
              <circle cx="25" cy="20.8" r="0.6" fill="white"/>
            </g>
            <!-- 별눈 (단계2+) -->
            <g id="starEyes2" opacity="0">
              <text x="12.5" y="24" font-size="8" fill="#FFD700">★</text>
              <text x="21.5" y="24" font-size="8" fill="#FFD700">★</text>
            </g>
            <!-- 하트눈 (단계4+) -->
            <g id="heartEyes2" opacity="0">
              <text x="12.5" y="24" font-size="8" fill="#FF4488">♥</text>
              <text x="21.5" y="24" font-size="8" fill="#FF4488">♥</text>
            </g>
            <!-- 코 + 입 -->
            <ellipse cx="20" cy="25" rx="1.2" ry="0.8" fill="#FFB3C6"/>

<script>
// ─── 단계 정의 ───
const STAGES = [

  {

    animName: 'wobble-5', animDur: 0.18,

    pompom: true, sweat: true, blush: 1,
    armAnim: true,
    pEmoji: ['🌈','💥','🎆','💜','✨','🔮','⚡'],

];

const MILESTONES = {
  5:   { emoji:'⭐', title:'5번 응원!', sub:'눈이 반짝이기 시작했어요 ⭐' },
  10:  { emoji:'🔥', title:'10번 응원!', sub:'응원봉까지 들었네요 🎉' },
  20:  { emoji:'🤯', title:'20번 응원!!', sub:'완전히 미쳐버렸어요 진짜 팬덤' },
  50:  { emoji:'🌈', title:'50번 응원!!!', sub:'당신이 오늘의 MVP입니다 👑\n이 순간을 공유해보세요' },
  100: { emoji:'👑', title:'100번 응원!!!!', sub:'전설이 됐습니다\n역대급 팬덤 인증 완료 🏆' },
};

let count = 0;
let stageIdx = 0;
let shownMilestones = new Set();
let animInterval = null;
let blinkInterval = null;
let isJumping = false;

// DOM
const charWrap   = document.getElementById('charWrap');
const charSvg    = document.getElementById('charSvg');
const bodyCircle = document.getElementById('bodyCircle');
const cheerBtn   = document.getElementById('cheerBtn');
const stageFill  = document.getElementById('stageFill');
const stageLbl   = document.getElementById('stageLbl');
const stageCnt   = document.getElementById('stageCnt');
const particleLayer = document.getElementById('particleLayer');
const flashLayer = document.getElementById('flashLayer');
const phone      = document.getElementById('phone');
const toast      = document.getElementById('toast');

// 눈 요소들
const eyeGroup  = document.getElementById('eyeGroup');
const starEyes  = document.getElementById('starEyes');
const heartEyes = document.getElementById('heartEyes');
const mouthPath = document.getElementById('mouthPath');
const pompom    = document.getElementById('pompom');
const sweatDrop = document.getElementById('sweatDrop');
const cheekL    = document.getElementById('cheekL');
const cheekR    = document.getElementById('cheekR');

function getStage(n) {
  return STAGES.find(s => n >= s.min && n <= s.max) || STAGES[0];
}

function onCheer() {
  count++;
  const stage = getStage(count);
  const prevIdx = stageIdx;
  stageIdx = stage.id;

  // 단계 바 업데이트
  updateStageBar(stage);

  // 단계 전환 처리
  if (stageIdx > prevIdx) {
    applyStage(stage, prevIdx);
  }

  // 찌그러짐 (press feedback)
  triggerSquish();

  // 파티클
  spawnParticles(stage);

  // 카운트 팝업
  spawnCountPop(count, stage.color);

  // 화면 플래시 (3단계+)
  if (stageIdx >= 3) triggerFlash(stage.color);

  // 화면 흔들림 (4단계+)
  if (stageIdx >= 4) triggerScreenShake();

  // 마일스톤
  if (MILESTONES[count] && !shownMilestones.has(count)) {
    shownMilestones.add(count);
    setTimeout(() => showMilestone(count), 350);
  }
}

function applyStage(stage, prevIdx) {
  // 캐릭터 애니메이션 업데이트
  setCharAnim(stage);

  // 얼굴 변화
  updateFace(stage);

  // 점프 (단계 전환 시)
  if (!isJumping) {
    isJumping = true;
    charWrap.style.animation = 'jump 0.4s ease';
    setTimeout(() => {
      charWrap.style.animation = '';
      setCharAnim(stage);
      isJumping = false;
    }, 400);
  }

  // 토스트
  showToast(stage.label + ' 단계 돌입!', stage.color);

  // 몸통 색상
  bodyCircle.setAttribute('fill', stage.bg);
}

function setCharAnim(stage) {
  if (!stage.animName) {
    charWrap.style.animation = 'none';
    return;
  }
  charWrap.style.animation = `${stage.animName} ${stage.animDur}s ease-in-out infinite`;
}

function updateFace(stage) {
  // 눈 타입
  eyeGroup.style.opacity  = (stage.eyeType === 'normal') ? '1' : '0';
  starEyes.style.opacity  = (stage.eyeType === 'star')   ? '1' : '0';
  heartEyes.style.opacity = (stage.eyeType === 'heart')  ? '1' : '0';

  // 입
  const mouths = {
    'smile-small': 'M17 28 Q20 30 23 28',
    'smile-med':   'M16 28 Q20 31 24 28',
    'smile-big':   'M15 27 Q20 31 25 27',
    'open':        'M15 27 Q20 32 25 27',
    'open-wide':   'M14 26 Q20 33 26 26',
  };
  mouthPath.setAttribute('d', mouths[stage.mouth] || mouths['smile-small']);

  // 혀 — 단계 3 이상에서 쏙 나옴
  const tongue = document.getElementById('tongue');
  if (tongue) tongue.setAttribute('opacity', stage.id >= 3 ? '1' : '0');

  // 볼터치
  cheekL.setAttribute('opacity', stage.blush);
  cheekR.setAttribute('opacity', stage.blush);

  // 응원봉
  pompom.style.opacity = stage.pompom ? '1' : '0';

  // 땀
  sweatDrop.style.opacity = stage.sweat ? '1' : '0';

  // 강아지 단계별 몸통 색
  const dogColors = ['#E8C99A','#E8C99A','#DDBB80','#D4A860','#CC9040','#FF8C42'];
  bodyCircle.setAttribute('fill', dogColors[stage.id] || dogColors[0]);
}

function triggerSquish() {
  charWrap.style.animation = 'none';
  void charWrap.offsetWidth;
  charSvg.style.animation = 'squish 0.15s ease';
  setTimeout(() => {
    charSvg.style.animation = 'none';
    if (!isJumping) setCharAnim(getStage(count));
  }, 150);
}

function updateStageBar(stage) {
  const s = stage;
  const max = s.max === Infinity ? count + 5 : s.max + 1;
  const min = s.min;
  const pct = s.max === Infinity
    ? Math.min(100, ((count - 50) / 5) * 20)
    : ((count - min) / (max - min)) * 100;

  stageFill.style.width = Math.min(100, pct) + '%';
  stageFill.style.background = s.color;
  stageLbl.textContent = s.label;
  stageLbl.style.color = s.color;
  stageCnt.textContent = count;
  stageCnt.style.color = s.color;
}

function spawnParticles(stage) {
  if (!stage.particles || !stage.pEmoji) return;
  const rect = cheerBtn.getBoundingClientRect();
  const cont = particleLayer.getBoundingClientRect();
  const cx = rect.left - cont.left + rect.width / 2;
  const cy = rect.top  - cont.top  + rect.height / 2;

  for (let i = 0; i < stage.particles; i++) {
    const el = document.createElement('div');
    const emoji = stage.pEmoji[Math.floor(Math.random() * stage.pEmoji.length)];
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist  = 30 + Math.random() * 70;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 10;
    const dur = (0.45 + Math.random() * 0.3);
    el.style.cssText = `
      position:absolute; left:${cx}px; top:${cy}px;
      font-size:${10 + Math.random() * 12}px;
      pointer-events:none; line-height:1;
      --tx:${tx}px; --ty:${ty}px;
      animation: pop-out ${dur}s ease forwards;
    `;
    el.textContent = emoji;
    particleLayer.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 50);
  }

  // 하트 플로팅 (단계 3+)
  if (stage.floats > 0) {
    for (let i = 0; i < stage.floats; i++) {
      const el = document.createElement('div');
      const floatEmojis = ['🩷','💚','💛','💙','💜','❤️'];
      el.textContent = floatEmojis[Math.floor(Math.random() * floatEmojis.length)];
      const sx = cx + (Math.random() - 0.5) * 24;
      const drift = (Math.random() - 0.5) * 36;
      const dur2 = 0.7 + Math.random() * 0.5;
      el.style.cssText = `
        position:absolute; left:${sx}px; top:${cy}px;
        font-size:${11 + Math.random() * 8}px;
        pointer-events:none; --drift:${drift}px;
        animation: float-up ${dur2}s ease-out forwards;
      `;
      particleLayer.appendChild(el);
      setTimeout(() => el.remove(), dur2 * 1000 + 50);
    }
  }
}

function spawnCountPop(n, color) {
  const rect = cheerBtn.getBoundingClientRect();
  const cont = particleLayer.getBoundingClientRect();
  const cx = rect.left - cont.left + rect.width / 2;
  const cy = rect.top  - cont.top;

  const el = document.createElement('div');
  el.textContent = '+1';
  el.style.cssText = `
    position:absolute; left:${cx - 8}px; top:${cy}px;
    font-size:11px; font-weight:800; color:${color};
    pointer-events:none; white-space:nowrap;
    animation: count-pop 0.6s ease forwards;
  `;
  particleLayer.appendChild(el);
  setTimeout(() => el.remove(), 650);
}

function triggerFlash(color) {
  flashLayer.style.background = color;
  flashLayer.style.animation = 'none';
  void flashLayer.offsetWidth;
  flashLayer.style.animation = 'flash 0.3s ease forwards';
}

function triggerScreenShake() {
  phone.style.animation = 'none';
  void phone.offsetWidth;
  phone.style.animation = 'screen-shake 0.35s ease';
  setTimeout(() => phone.style.animation = '', 350);
}

function showToast(msg, color) {
  toast.textContent = msg;
  toast.style.background = color || '#22C55E';
  toast.style.color = (color === '#F59E0B' || color === '#FFD93D') ? '#000' : '#fff';
  toast.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => toast.classList.remove('show'), 1600);
}

function showMilestone(n) {
  const m = MILESTONES[n];
  document.getElementById('msEmoji').textContent = m.emoji;
  document.getElementById('msTitle').textContent = m.title;
  document.getElementById('msSub').textContent = m.sub;
  document.getElementById('milestone').classList.add('show');
}

function closeMilestone() {
  document.getElementById('milestone').classList.remove('show');
}

function toggleExpand() {
  document.getElementById('expandBlock').classList.toggle('open');
}

// 눈 깜박임 루프
setInterval(() => {
  const eL = document.getElementById('eyeL');
  const eR = document.getElementById('eyeR');
  if (stageIdx < 2) {
    eL.style.animation = 'blink 0.15s ease';
    eR.style.animation = 'blink 0.15s ease';
    setTimeout(() => { eL.style.animation=''; eR.style.animation=''; }, 150);
  }
}, 3000 + Math.random() * 2000);

// ═══════════════════════════════════════
// 2·3위 캐릭터 공통 시스템

function makeCharState(id) {
  return { count: 0, stageIdx: 0, isJumping: false };
}

const state2 = makeCharState(2);
const state3 = makeCharState(3);

// 각 캐릭터별 DOM 참조

    cheekL: document.getElementById('cheekL2'),

    // 토끼 단계별 색상
    bodyColors: ['#F5F0FF','#F5F0FF','#EDE0FF','#D8C0FF','#CC99FF','#BB77FF'],

    wrap: document.getElementById('charWrap3'),
    svg:  document.getElementById('charSvg3'),
    body: document.getElementById('bodyCircle3'),
    eyeGroup: document.getElementById('eyeGroup3'),
    starEyes: document.getElementById('starEyes3'),
    heartEyes: document.getElementById('heartEyes3'),
    mouth: document.getElementById('mouthPath3'),
    pompom: document.getElementById('pompom3'),
    sweat: document.getElementById('sweat3'),

function onCheer3() { onCheerChar(3); }

function onCheerChar(id) {
  const char = CHARS[id];
  const st = char.state;
  st.count++;

  const stage = getStage(st.count);
  const prevIdx = st.stageIdx;
  st.stageIdx = stage.id;

  // 몸통 색
  char.body.setAttribute('fill', char.bodyColors[stage.id] || char.bodyColors[0]);

  // 단계 전환 시
  if (st.stageIdx > prevIdx) {
    applyCharStage(char, stage, prevIdx);

  // 찌그러짐
  triggerCharSquish(char, stage);

  // 파티클
  spawnCharParticles(char, stage);

  // 카운트 팝
  spawnCharCountPop(char, stage.color);

  // 플래시 (단계3+)
  if (st.stageIdx >= 3) triggerFlash(stage.color);

  // 화면 흔들림 (단계4+)
  if (st.stageIdx >= 4) triggerScreenShake();
}

function applyCharStage(char, stage, prevIdx) {
  setCharAnimById(char, stage);
  updateCharFace(char, stage);

  if (!char.state.isJumping) {
    char.state.isJumping = true;
    char.wrap.style.animation = 'jump 0.4s ease';
    setTimeout(() => {
      char.wrap.style.animation = '';
      setCharAnimById(char, getStage(char.state.count));
      char.state.isJumping = false;
    }, 400);
  }
}

function setCharAnimById(char, stage) {
  if (!stage.animName) {
    char.wrap.style.animation = 'none';
    return;
  }
  char.wrap.style.animation = `${stage.animName} ${stage.animDur}s ease-in-out infinite`;
}

function updateCharFace(char, stage) {
  // 눈
  char.eyeGroup.style.opacity  = stage.eyeType === 'normal' ? '1' : '0';
  char.starEyes.style.opacity  = stage.eyeType === 'star'   ? '1' : '0';
  char.heartEyes.style.opacity = stage.eyeType === 'heart'  ? '1' : '0';

  // 입
  const mouths = {
    'smile-small': 'M17 27 Q20 29 23 27',
    'smile-med':   'M16 27 Q20 30 24 27',
    'smile-big':   'M15 26 Q20 31 25 26',
    'open':        'M15 26 Q20 32 25 26',
    'open-wide':   'M14 25 Q20 33 26 25',
  };
  char.mouth.setAttribute('d', mouths[stage.mouth] || mouths['smile-small']);

  // 볼터치
  char.cheekL.setAttribute('opacity', stage.blush);
  char.cheekR.setAttribute('opacity', stage.blush);

  // 응원봉
  char.pompom.style.opacity = stage.pompom ? '1' : '0';

  // 땀
  char.sweat.setAttribute('opacity', stage.sweat ? '1' : '0');
}

function triggerCharSquish(char, stage) {
  char.wrap.style.animation = 'none';
  void char.wrap.offsetWidth;
  char.svg.style.animation = 'squish 0.15s ease';
  setTimeout(() => {
    char.svg.style.animation = 'none';
    if (!char.state.isJumping) setCharAnimById(char, getStage(char.state.count));
  }, 150);
}

function spawnCharParticles(char, stage) {
  if (!stage.particles || !stage.pEmoji) return;
  const btn = char.wrap.closest('.cheer-btn');
  const rect = btn.getBoundingClientRect();
  const cont = particleLayer.getBoundingClientRect();
  const cx = rect.left - cont.left + rect.width / 2;
  const cy = rect.top  - cont.top  + rect.height / 2;

  for (let i = 0; i < stage.particles; i++) {
    const el = document.createElement('div');
    const emoji = stage.pEmoji[Math.floor(Math.random() * stage.pEmoji.length)];
    const angle = Math.random() * 360 * Math.PI / 180;
    const dist  = 30 + Math.random() * 60;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 10;
    const dur = (0.4 + Math.random() * 0.3);
    el.style.cssText = `
      position:absolute; left:${cx}px; top:${cy}px;
      font-size:${10+Math.random()*10}px;
      pointer-events:none; line-height:1;
      --tx:${tx}px; --ty:${ty}px;
      animation: pop-out ${dur}s ease forwards;
    `;
    el.textContent = emoji;
    particleLayer.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000 + 50);
  }

  if (stage.floats > 0) {
    const floatEmojis = ['🩷','💜','💛','💙','❤️','💚'];
    for (let i = 0; i < stage.floats; i++) {
      const el = document.createElement('div');
      el.textContent = floatEmojis[Math.floor(Math.random()*floatEmojis.length)];
      const sx = cx + (Math.random()-0.5)*24;
      const drift = (Math.random()-0.5)*36;
      const dur2 = 0.6 + Math.random()*0.5;
      el.style.cssText = `
        position:absolute; left:${sx}px; top:${cy}px;
        font-size:${10+Math.random()*8}px;
        pointer-events:none; --drift:${drift}px;
        animation: float-up ${dur2}s ease-out forwards;
      `;
      particleLayer.appendChild(el);
      setTimeout(() => el.remove(), dur2*1000+50);
    }
  }
}

function spawnCharCountPop(char, color) {
  const btn = char.wrap.closest('.cheer-btn');
  const rect = btn.getBoundingClientRect();
  const cont = particleLayer.getBoundingClientRect();
  const cx = rect.left - cont.left + rect.width/2;
  const cy = rect.top  - cont.top;
  const el = document.createElement('div');
  el.textContent = '+1';
  el.style.cssText = `
    position:absolute; left:${cx-8}px; top:${cy}px;
    font-size:11px; font-weight:800; color:${color};
    pointer-events:none;
    animation: count-pop 0.6s ease forwards;
  `;
  particleLayer.appendChild(el);
  setTimeout(() => el.remove(), 650);
}

// 제목 더블탭 리셋
let tapCount = 0;
phone.addEventListener('dblclick', (e) => {
  if (e.target === phone || e.target.className === 'stage-bar') {
    count = 0; stageIdx = 0; shownMilestones.clear();
    charWrap.style.animation = 'none';
    bodyCircle.setAttribute('fill', '#FFD93D');
    updateFace(STAGES[0]);
    stageFill.style.width = '0%';
    stageFill.style.background = '#3a3a3a';
    stageLbl.textContent = '😴 대기 중';
    stageLbl.style.color = '#3a3a3a';
    stageCnt.textContent = '0';
    stageCnt.style.color = '#3a3a3a';
    showToast('리셋! 다시 시작해요', '#555');
  }
});
</script>
